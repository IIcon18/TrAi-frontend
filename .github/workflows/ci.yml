name: Frontend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Lint
        run: npm run lint || echo "Lint warnings found (non-blocking)"
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit || echo "Type errors found (non-blocking)"
        continue-on-error: true

      - name: Build
        run: CI=false npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trai-frontend .

      - name: Verify image
        run: docker images trai-frontend
